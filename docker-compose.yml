services:
  db:
    image: postgres:15-alpine
    container_name: ecommerce-postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: ecommerce_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d ecommerce_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce-api
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://root:rootpassword@db:5432/ecommerce_db?schema=public
      JWT_SECRET: your_super_secret_jwt_key
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
